name: Release Plugin

on:
  push:
    branches: [main]

env:
  PLUGIN_NAME: CombatSimulator
  SOLUTION_DIR: CombatSimulator

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify version and update log
        run: python3 .github/scripts/verify-update-log.py ${{ env.SOLUTION_DIR }} ${{ env.PLUGIN_NAME }}

      # The private experimental module must never reach a public release. This workflow
      # deliberately does NOT check the submodule out: with the sources absent, the csproj
      # leaves DEV_EXPERIMENTAL undefined and the plugin compiles against the no-op stub.
      # The submodule IS built in CI (see build.yaml) — just never in what ships.
      - name: Verify release source has no experimental module
        run: test ! -e ${{ env.SOLUTION_DIR }}/Dev/Experimental/DevExperimentalModule.cs

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Dalamud
        run: |
          mkdir -p $HOME/dalamud
          wget -q https://goatcorp.github.io/dalamud-distrib/latest.zip -O /tmp/dalamud.zip
          unzip -o /tmp/dalamud.zip -d $HOME/dalamud

      - name: Build
        run: dotnet build ${{ env.SOLUTION_DIR }}/${{ env.PLUGIN_NAME }}.csproj -c Release
        env:
          DALAMUD_HOME: /home/runner/dalamud

      - name: Extract version
        id: version
        run: |
          ver=$(grep -oP '(?<=<Version>).*(?=</Version>)' ${{ env.SOLUTION_DIR }}/${{ env.PLUGIN_NAME }}.csproj)
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Prepare release artifacts
        run: |
          # Dalamud SDK produces latest.zip with all DLLs (plugin + dependencies)
          sdk_zip="${{ env.SOLUTION_DIR }}/bin/Release/${{ env.PLUGIN_NAME }}/latest.zip"
          echo "SDK zip: $sdk_zip"
          mkdir -p release
          unzip -o "$sdk_zip" -d release/
          # Remove nested zip artifact if present
          rm -f release/${{ env.PLUGIN_NAME }}.zip
          cd release && zip -r ../${{ env.PLUGIN_NAME }}.zip .

      # Belt and braces: assert against the DLL that actually ships, not just the source tree.
      # A source-only check is what was in place before and it never covered the artifact —
      # the release workflow was pulling the private module in on purpose. Type names live in
      # the metadata as ASCII, so a plain grep finds them.
      - name: Verify release artifact has no experimental code
        run: |
          dll="release/${{ env.PLUGIN_NAME }}.dll"
          test -f "$dll" || { echo "::error::Missing $dll"; exit 1; }
          status=0
          for sym in MonsterModeController DevExperimentalModule VictorySequenceController GrabConformSolver BoneHoldTestModeController SpectatorController; do
            if grep -qa "$sym" "$dll"; then
              echo "::error::Release artifact contains experimental symbol '$sym' — the private dev module must never ship."
              status=1
            fi
          done
          [ $status -eq 0 ] && echo "Release artifact is clean of experimental code."
          exit $status

      - name: Generate pluginmaster.json
        run: |
          python3 -c "
          import json, os
          with open('${{ env.SOLUTION_DIR }}/${{ env.PLUGIN_NAME }}.json') as f:
              data = json.load(f)
          version = '${{ steps.version.outputs.version }}'
          actual_version = data.get('AssemblyVersion')
          if actual_version != version:
              raise SystemExit(f'CombatSimulator.json AssemblyVersion {actual_version} does not match {version}')
          data['AssemblyVersion'] = version
          data['InternalName'] = '${{ env.PLUGIN_NAME }}'
          data['RepoUrl'] = 'https://github.com/${{ github.repository }}'
          dl = 'https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/${{ env.PLUGIN_NAME }}.zip'
          data['DownloadLinkInstall'] = dl
          data['DownloadLinkUpdate'] = dl
          data['DownloadLinkTesting'] = dl
          data['DalamudApiLevel'] = 15
          # Merge into existing pluginmaster.json so other plugins are preserved
          master = []
          if os.path.exists('pluginmaster.json'):
              with open('pluginmaster.json') as f:
                  master = json.load(f)
          master = [e for e in master if e.get('InternalName') != '${{ env.PLUGIN_NAME }}']
          master.append(data)
          print(json.dumps(master, indent=2))
          " > release/pluginmaster.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ env.PLUGIN_NAME }} v${{ steps.version.outputs.version }}
          files: ${{ env.PLUGIN_NAME }}.zip
          generate_release_notes: true

      - name: Update pluginmaster.json on main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git stash
          git checkout main
          cp release/pluginmaster.json pluginmaster.json
          git add pluginmaster.json
          if git diff --cached --quiet; then
            echo "pluginmaster.json already up to date"
          else
            git commit -m "Update pluginmaster.json for v${{ steps.version.outputs.version }} [skip ci]"
            git push origin main
          fi
