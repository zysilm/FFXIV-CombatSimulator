name: Build Feature Branch

on:
  push:
    branches-ignore: [main]
  pull_request:

env:
  PLUGIN_NAME: CombatSimulator
  SOLUTION_DIR: CombatSimulator

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify public build has no experimental module
        run: test ! -e ${{ env.SOLUTION_DIR }}/Dev/Experimental/DevExperimentalModule.cs

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Dalamud
        run: |
          mkdir -p $HOME/dalamud
          wget -q https://goatcorp.github.io/dalamud-distrib/latest.zip -O /tmp/dalamud.zip
          unzip -o /tmp/dalamud.zip -d $HOME/dalamud

      - name: Build
        run: dotnet build ${{ env.SOLUTION_DIR }}/${{ env.PLUGIN_NAME }}.csproj -c Release
        env:
          DALAMUD_HOME: /home/runner/dalamud
